# Workspace root (virtual) — monorepo apps/* + libs/* qua uv workspace.
# `uv sync` cài toàn bộ member (editable); `uv run --package <name> ...` chạy 1 stage.

[tool.uv]
# Chặn trên cửa sổ Python cho universal resolution: không có bound này, resolver
# phải thỏa cả fork ≥3.14 → rơi về llvmlite/numba 2021 (sdist-only, vỡ build).
environments = ["python_version < '3.14'"]

[tool.uv.workspace]
members = ["apps/*", "libs/*"]

[tool.uv.sources]
# Member phụ thuộc member khác được resolve từ workspace, không phải PyPI.
crawl-datasets-common = { workspace = true }
crawl-datasets-crawler = { workspace = true }
crawl-datasets-builder = { workspace = true }
crawl-datasets-integrator = { workspace = true }

[dependency-groups]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "types-PyYAML>=6.0",
]

[tool.ruff]
line-length = 88
src = ["apps", "libs"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "C4", "PGH"]
ignore = ["S101", "B018", "N802", "N803"]

[tool.mypy]
python_version = "3.12"
strict = true
namespace_packages = true
explicit_package_bases = true
# Map mọi src-layout member về đúng tên module — thiếu path này mypy vừa không
# resolve cross-package import, vừa báo "source file found twice" (apps/ vs site-packages).
mypy_path = [
    "libs/common/src",
    "apps/builder/src",
    "apps/cleaner/src",
    "apps/crawler/src",
    "apps/extractor/src",
    "apps/integrator/src",
    "apps/probe/src",
    "apps/profiler/src",
    "apps/service/src",
]

# Third-party libs không ship type stubs / là optional backend (gate optional-import).
[[tool.mypy.overrides]]
module = [
    "arq.*",
    "ftfy.*",
    "fasttext.*",
    "presidio_analyzer.*",
    "presidio_anonymizer.*",
    "huggingface_hub.*",
    "datatrove.*",
    "datasketch.*",
    "trafilatura.*",
    "pymupdf.*",
    "fitz.*",
    "pyarrow.*",
    "httpx.*",
    "playwright.*",
    "umap.*",
    "hdbscan.*",
    "sentence_transformers.*",
    "torch.*",
    "transformers.*",
]
ignore_missing_imports = true

[tool.pylint]
max_line_length = 88
disable = ["missing-docstring", "too-few-public-methods"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["apps", "libs"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
    "raise NotImplementedError",
]
