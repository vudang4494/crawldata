# Default config — §9.3 single source of truth
# Rename một key → update mọi reference trong apps/*.

global:
  seed: 42
  pipeline_version: "1.3.0"

crawl:
  render: auto            # auto|http|browser
  render_min_text_len: 200  # §3.2 auto — text < threshold → escalate browser
  max_depth: 3
  per_host_concurrency: 4
  respect_robots: true    # §2 fail-closed — KHÔNG đặt false
  politeness_delay: 1.0   # §3 — giây giữa 2 request cùng host (robots Crawl-delay ghi đè)
  url_exclude: []         # §3.3 — regex loại URL non-article khỏi frontier

extract:
  primary: trafilatura    # trafilatura|resiliparse|rs-trafilatura
  fallback: readability

clean:
  lang_id: glotlid        # glotlid|fasttext
  lang_allow: [vi, en]
  lang_score_min:
    vi: 0.60              # §5.3 — VN cần threshold riêng
    en: 0.65
  gopher_quality:
    min_words: 50
    max_words: 100000
    mean_word_length_min: 3
    mean_word_length_max: 10
    symbol_to_word_ratio: 0.1
    bullet_line_ratio: 0.9
    ellipsis_line_ratio: 0.3
    alpha_word_ratio: 0.8
    min_stopwords: 2
  vi_overrides:
    use_vi_stopwords: true
    disable_word_len_rule: true
  minhash:
    ngram: 5
    num_hashes: 112
    bands: 14
    rows: 8
    scope: per_source      # §5.4 — KHÔNG đặt global
  pii:
    backend: presidio
    vi_regex: true         # §11 — CCCD/CMND/SĐT +84
    presidio_langs: [en]   # §5.5 — NER chỉ cho lang có model; doc VN dùng VN regex
  decontam:
    benchmarks: [mmlu, aime, math500, mgsm]
    ngram: 13
  quality:                 # §5.3 quality classifier (P1, tùy chọn)
    enabled: false         # true đòi backend thật + model_path (fail-closed)
    backend: fasttext      # fasttext | transformer (FineWeb2-HQ, §5.3)
    model_path: null       # fasttext: .bin · transformer: HF repo/dir chứa head .pt
    positive_label: "__label__hq"
    min_score: 0.5
    embed_model: FacebookAI/xlm-roberta-base       # transformer: model embed
    lang_heads: {vi: vie_Latn.pt, en: eng_Latn.pt}  # transformer: head per-lang

profile:
  cluster:                 # §6 BGE-M3→UMAP→HDBSCAN (P1) — extras cluster+embed
    enabled: false
    embed_model: BAAI/bge-m3
    max_docs: 2000
    min_cluster_size: 5

build:
  format: chatml
  synth:                   # §7.1 Phase B — LLM local (block agent) sinh cặp QA
    enabled: false
    questions_per_doc: 2
    max_chars: 4000

integrate:
  cross_dedup: true
  source_priority: [curated_v2, crawl_new]   # §8.2 — giữ nguồn hạng cao
  mix_ratios:
    vi: 0.5
    en: 0.5

service:
  redis_url: redis://localhost:6379   # §1 — arq queue
  max_jobs: 4

agent:                     # §14 — intake agent (LLM local, API OpenAI-compatible)
  base_url: http://localhost:11434/v1   # Ollama /v1 (llama.cpp/LM Studio tương thích)
  model: gemma4:e4b        # nâng cấp: hf.co/unsloth/gemma-4-26B-A4B-it-qat-GGUF:Q4_K_M
  temperature: 0.2
  timeout_s: 120
  max_rounds: 3            # số vòng agent được hỏi lại user